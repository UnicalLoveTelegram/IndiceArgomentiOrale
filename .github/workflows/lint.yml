name: Lint Markdown

on:
  push:
    branches: [main]
    paths:
      - 'docs/**/*.md'
      - '*.md'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**/*.md'
      - '*.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache venv
        uses: actions/cache@v3
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Markdown linting
        run: mdformat --extensions space_control --check docs/ README.md CONTRIBUTING.md
        
      - name: Summary on failure
        if: failure()
        run: |
          echo "## ❌ Markdown Linting Failed"
          echo "Please fix the issues above."
          echo ""
          echo "To auto-fix locally, run:"
          echo "\`\`\`bash"
          echo "make lint-fix"
          echo "\`\`\`"
          echo ""
          echo "Then review changes and commit."
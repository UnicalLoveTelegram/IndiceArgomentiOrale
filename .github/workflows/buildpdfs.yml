name: Docs to PDF
on:
  workflow_call:
    secrets:
      PDF_PRIVATE_KEY:
        required: true

permissions:
  contents: write

jobs:
  converttopdf:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ssh-key: ${{ secrets.PDF_PRIVATE_KEY }}

      - name: Convert Markdown to PDF (Triennale)
        uses: baileyjm02/markdown-to-pdf@v1.2.0
        with:
          input_dir: ./docs/laurea-triennale
          output_dir: ./pdfs/laurea-triennale/
          build_html: false
          table_of_contents: false

      - name: Convert Markdown to PDF (Magistrale)
        uses: baileyjm02/markdown-to-pdf@v1.2.0
        with:
          input_dir: ./docs/laurea-magistrale
          output_dir: ./pdfs/laurea-magistrale/
          build_html: false
          table_of_contents: false

      - name: Commit and push PDFs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin git@github.com:${{ github.repository }}.git
          git add pdfs/
          git diff --cached --quiet && echo 'No PDF changes to commit' && exit 0
          git commit -m 'chore: update generated PDFs [skip ci]'
          git push
